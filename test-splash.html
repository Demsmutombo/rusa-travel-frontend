<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Splash Rusa Travel</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
        }
        .splash {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: white;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 9999;
        }
        .logo {
            width: 128px;
            height: 128px;
            background: #3B82F6;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 24px;
            font-weight: bold;
            margin-bottom: 32px;
        }
        .loader {
            display: flex;
            justify-content: center;
            gap: 8px;
            margin-bottom: 16px;
        }
        .dot {
            width: 8px;
            height: 8px;
            background: #3B82F6;
            border-radius: 50%;
            animation: bounce 1.4s infinite;
        }
        .dot:nth-child(2) { animation-delay: 0.1s; }
        .dot:nth-child(3) { animation-delay: 0.2s; }
        @keyframes bounce {
            0%, 80%, 100% { transform: scale(0); }
            40% { transform: scale(1); }
        }
    </style>
</head>
<body>
    <div class="splash">
        <div style="text-align: center;">
            <div class="logo">RT</div>
            <div class="loader">
                <div class="dot"></div>
                <div class="dot"></div>
                <div class="dot"></div>
            </div>
            <p style="color: #6B7280; font-size: 14px; margin: 0;">Démarrage du système...</p>
        </div>
    </div>
    
    <script>
        console.log('Test Splash Screen - Redirection dans 3 secondes')
        setTimeout(() => {
            console.log('Redirection vers /home')
            window.location.href = '/home'
        }, 3000)
    </script>
</body>
</html>
